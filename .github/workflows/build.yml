name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build firmware (${{ matrix.board }})
    strategy:
      fail-fast: false
      matrix:
        board: [nucleo_h563zi, nucleo_h753zi]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: example-application
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: example-application
          toolchains: arm-zephyr-eabi
          ccache-cache-key: ${{ matrix.board }}

      - name: Build firmware
        working-directory: example-application
        run: west build -b ${{ matrix.board }} app

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: example-application/build/zephyr/zephyr.elf

  test:
    name: Twister Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: example-application
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: example-application
          toolchains: arm-zephyr-eabi
          ccache-cache-key: ubuntu-22.04-tests

      - name: Twister Tests
        working-directory: example-application
        run: west twister -T tests -v --inline-logs --integration
